{% extends 'equipment/base.html' %}
{% block title %}{{ action }} Категория{% endblock %}
{% block content %}
<div class="row mb-4">
    <div class="col">
        <h1>{{ action }} Категория</h1>
    </div>
</div>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'category_list' %}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Откажи
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Запиши
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
